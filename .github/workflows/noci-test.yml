name: "noci-action Test"
on:
  pull_request:
    paths:
      - "action/**"
      - "go.**"
      - "**.go"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Setup noci binary cache
        uses: ./action
        with:
          repo: ${{ secrets.NOCI_REPO || 'lonerOrz/noci-cache' }}
          signing-key: ${{ secrets.NOCI_SIGNING_KEY }}
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build Local Dummy (Ensure Hook Triggers)
        run: |
          nix build --impure --no-link --expr 'derivation { name = "test-${{ github.sha }}"; system = "x86_64-linux"; builder = "/bin/sh"; args = [ "-c" "echo ${{ github.sha }} > $out" ]; }'

      - name: Build Flake Target
        run: |
          nix build github:lonerOrz/loneros-nur#wooz --no-link -L

      - name: Build and Time Upload Real ISO
        run: |
          ISO_PATH=$(nix build github:lonerOrz/loneros-nixos#packages.x86_64-linux.iso --print-out-paths --no-link -L)

          nix path-info -sh "$ISO_PATH"

          /tmp/noci push "$ISO_PATH" --profile
        env:
          NOCI_REGISTRY: ${{ secrets.NOCI_REGISTRY || 'ghcr.io' }}
          NOCI_REPO: ${{ secrets.NOCI_REPO || 'lonerOrz/noci-cache' }}
          NOCI_SIGNING_KEY: ${{ secrets.NOCI_SIGNING_KEY }}
          NOCI_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
