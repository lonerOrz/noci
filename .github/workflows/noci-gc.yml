name: "Storage GC"
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  gc-and-vacuum:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target-repository: ["lonerOrz/noci", "lonerOrz/cachyos-loner"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Execute Logical GC
        run: |
          nix run .#noci -- gc --max-size 15GB --grace-period 360h --physical-sweep --dry-run=false
        env:
          NOCI_REGISTRY: "ghcr.io"
          NOCI_REPO: ${{ matrix.target-repository }}
          NOCI_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Purge untagged packages for ${{ matrix.target-repository }}
        uses: Chizkiyahu/delete-untagged-ghcr-action@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository_owner: ${{ github.repository_owner }}
          repository: ${{ matrix.target-repository }}
          package_name: "nix-cache" # noci 统一
          owner_type: ${{ github.event.repository.owner.type == 'Organization' && 'org' || 'user' }}
          untagged_only: true
