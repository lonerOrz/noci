<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>noci cache dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css" />
    <script src="/app.js" defer></script>
  </head>
  <body
    class="bg-slate-900 text-slate-100 min-h-screen selection:bg-indigo-500/30 selection:text-indigo-200 select-none cursor-default"
  >
    <div class="max-w-6xl mx-auto px-4 py-10 sm:px-6 lg:px-8">
      <header
        class="flex flex-col md:flex-row md:items-center md:justify-between pb-8 mb-8 border-b border-slate-800 select-none"
      >
        <div>
          <div class="flex items-center gap-3">
            <span class="text-3xl">📦</span>
            <h1
              class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-sky-400 to-emerald-400 bg-clip-text text-transparent"
            >
              noci dashboard
            </h1>
          </div>
          <p class="text-sm text-slate-400 mt-2 font-medium" id="repo-name">
            OCI Repository: --
          </p>
        </div>
        <div class="mt-4 md:mt-0 flex items-center gap-3">
          <span
            class="inline-flex items-center rounded-full bg-emerald-500/10 px-3 py-1 text-xs font-semibold text-emerald-400 ring-1 ring-inset ring-emerald-500/20"
          >
            <span
              class="w-1.5 h-1.5 mr-1.5 rounded-full bg-emerald-400 animate-pulse"
            ></span
            >Active
          </span>
        </div>
      </header>

      <div
        class="mb-10 overflow-hidden rounded-2xl border border-slate-800 bg-slate-950 p-6 shadow-2xl select-none"
      >
        <h2
          class="text-sm font-semibold text-indigo-400 tracking-wider uppercase mb-3 select-none cursor-default"
        >
          Quick Start
        </h2>
        <div
          class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between bg-slate-900 rounded-xl p-3 border border-slate-800/80 gap-3"
        >
          <div
            class="overflow-x-auto whitespace-nowrap pr-4 w-full select-all scrollbar-none cursor-pointer"
          >
            <code
              class="text-xs sm:text-sm text-slate-300 font-medium select-all"
              id="nix-cmd"
              >nix build .#package --substituters "http://127.0.0.1:8080"
              --option require-sigs false</code
            >
          </div>
          <button
            onclick="copyCmd(event)"
            class="flex-shrink-0 rounded-lg bg-slate-800 hover:bg-indigo-600 px-4 py-2 text-xs font-semibold text-slate-200 hover:text-white transition-all border border-slate-700 select-none cursor-pointer"
          >
            Copy
          </button>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-6 sm:grid-cols-3 mb-10 select-none">
        <div
          class="rounded-2xl border border-slate-800/80 bg-slate-950 p-6 shadow-xl transition-all hover:scale-[1.01] hover:border-indigo-500/30"
        >
          <dt
            class="text-xs font-semibold uppercase tracking-wider text-slate-500 flex items-center gap-2"
          >
            <span>📦</span>Cached Packages
          </dt>
          <dd
            class="mt-3 text-4xl font-extrabold tracking-tight text-white"
            id="stat-count"
          >
            0
          </dd>
        </div>
        <div
          class="rounded-2xl border border-slate-800/80 bg-slate-950 p-6 shadow-xl transition-all hover:scale-[1.01] hover:border-emerald-500/30"
        >
          <dt
            class="text-xs font-semibold uppercase tracking-wider text-slate-500 flex items-center gap-2"
          >
            <span>💾</span>Total Cache Size
          </dt>
          <dd
            class="mt-3 text-4xl font-extrabold tracking-tight text-white"
            id="stat-size"
          >
            0 B
          </dd>
        </div>
        <div
          class="rounded-2xl border border-slate-800/80 bg-slate-950 p-6 shadow-xl transition-all hover:scale-[1.01] hover:border-sky-500/30"
        >
          <dt
            class="text-xs font-semibold uppercase tracking-wider text-slate-500 flex items-center gap-2"
          >
            <span>🌐</span>Registry Endpoint
          </dt>
          <dd
            class="mt-3 text-xl sm:text-2xl font-extrabold tracking-tight text-indigo-400 truncate"
            id="stat-endpoint"
          >
            -
          </dd>
        </div>
      </div>

      <div class="mb-8">
        <div class="relative rounded-xl shadow-sm select-none">
          <div
            class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4"
          >
            <svg
              class="h-5 w-5 text-slate-500"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.637 10.637Z"
              />
            </svg>
          </div>
          <input
            type="text"
            id="search-input"
            placeholder="Search packages by name, store path, or hash..."
            class="block w-full rounded-xl border border-slate-800/80 bg-slate-950 py-3.5 pl-11 pr-4 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 sm:text-sm transition-all shadow-inner cursor-text select-text"
          />
        </div>
      </div>

      <div
        class="overflow-hidden shadow-2xl rounded-2xl border border-slate-800 bg-slate-950"
      >
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-800 select-none">
            <thead class="bg-slate-900/60">
              <tr>
                <th
                  class="py-4 pl-6 pr-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider"
                >
                  Package Name
                </th>
                <th
                  class="px-3 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider"
                >
                  Hash
                </th>
                <th
                  class="px-3 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider"
                >
                  Size
                </th>
                <th
                  class="px-3 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider"
                >
                  Uploaded At
                </th>
              </tr>
            </thead>
            <tbody
              class="divide-y divide-slate-800/80 bg-slate-950"
              id="package-rows"
            ></tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
