<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noci cache dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        code, pre, .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen selection:bg-indigo-500 selection:text-white">
    <div class="max-w-6xl mx-auto px-4 py-10 sm:px-6 lg:px-8">
        <header class="flex flex-col md:flex-row md:items-center md:justify-between pb-8 mb-8 border-b border-slate-800">
            <div>
                <div class="flex items-center gap-3">
                    <span class="text-3xl">📦</span>
                    <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-sky-400 to-emerald-400 bg-clip-text text-transparent">noci dashboard</h1>
                </div>
                <p class="text-sm text-slate-400 mt-2 font-medium" id="repo-name">OCI Repository: --</p>
            </div>
            <div class="mt-4 md:mt-0 flex items-center gap-3">
                <span class="inline-flex items-center rounded-full bg-emerald-500/10 px-3 py-1 text-xs font-semibold text-emerald-400 ring-1 ring-inset ring-emerald-500/20">
                    <span class="w-1.5 h-1.5 mr-1.5 rounded-full bg-emerald-400 animate-pulse"></span>Active
                </span>
            </div>
        </header>

        <div class="mb-10 overflow-hidden rounded-2xl border border-slate-800 bg-slate-950 p-6 shadow-2xl">
            <h2 class="text-sm font-semibold text-indigo-400 tracking-wider uppercase mb-3">Quick Start</h2>
            <div class="flex items-center justify-between bg-slate-900 rounded-xl p-4 border border-slate-800/80">
                <code class="text-xs sm:text-sm text-slate-300 select-all overflow-x-auto whitespace-nowrap pr-4" id="nix-cmd">nix build .#package --substituters "http://127.0.0.1:8080" --option require-sigs false</code>
                <button onclick="copyCmd()" class="flex-shrink-0 ml-2 rounded-lg bg-slate-800 hover:bg-slate-700 px-3.5 py-2 text-xs font-medium text-slate-200 transition-all hover:text-white border border-slate-700">Copy</button>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-3 mb-10">
            <div class="rounded-2xl border border-slate-800 bg-slate-950 p-6 shadow-xl transition-all hover:border-slate-700">
                <dt class="text-xs font-semibold uppercase tracking-wider text-slate-500">Cached Packages</dt>
                <dd class="mt-2 text-4xl font-bold tracking-tight text-white" id="stat-count">0</dd>
            </div>
            <div class="rounded-2xl border border-slate-800 bg-slate-950 p-6 shadow-xl transition-all hover:border-slate-700">
                <dt class="text-xs font-semibold uppercase tracking-wider text-slate-500">Total Cache Size</dt>
                <dd class="mt-2 text-4xl font-bold tracking-tight text-white" id="stat-size">0 B</dd>
            </div>
            <div class="rounded-2xl border border-slate-800 bg-slate-950 p-6 shadow-xl transition-all hover:border-slate-700">
                <dt class="text-xs font-semibold uppercase tracking-wider text-slate-500">Registry Endpoint</dt>
                <dd class="mt-2 text-2xl font-bold tracking-tight text-indigo-400 truncate mt-3.5" id="stat-endpoint">-</dd>
            </div>
        </div>

        <div class="mb-8">
            <div class="relative rounded-xl shadow-sm">
                <input type="text" id="search-input" placeholder="Search packages by name, store path, or hash..." class="block w-full rounded-xl border border-slate-800 bg-slate-950 py-3.5 pl-4 pr-10 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-indigo-500 sm:text-sm transition-all shadow-inner">
            </div>
        </div>

        <div class="overflow-hidden shadow-2xl rounded-2xl border border-slate-800 bg-slate-950">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-800">
                    <thead class="bg-slate-900/60">
                        <tr>
                            <th class="py-4 pl-6 pr-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Package Name</th>
                            <th class="px-3 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Hash</th>
                            <th class="px-3 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Size</th>
                            <th class="px-3 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Uploaded At</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-800/80 bg-slate-950" id="package-rows">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const db = /* {{.IndexJSON}} */;

        const currentPort = window.location.port || '8080';
        const proxyUrl = 'http://127.0.0.1:' + currentPort;

        document.getElementById("repo-name").innerText = "OCI Repository: " + db.registry + "/" + db.repo;
        document.getElementById("stat-endpoint").innerText = db.registry;
        document.getElementById("nix-cmd").innerText = 'nix build .#package --substituters "' + proxyUrl + '" --option require-sigs false';

        const entries = Object.keys(db.entries || {}).map(hash => ({
            hash: hash,
            ...db.entries[hash]
        })).sort((a, b) => b.added.localeCompare(a.added));

        const totalBytes = entries.reduce((acc, cur) => acc + cur.nar_size, 0);
        document.getElementById("stat-count").innerText = entries.length;
        document.getElementById("stat-size").innerText = formatBytes(totalBytes);

        const container = document.getElementById("package-rows");
        const searchInput = document.getElementById("search-input");

        function render(filterText) {
            container.innerHTML = "";
            const filtered = entries.filter(e => {
                if (!filterText) return true;
                const q = filterText.toLowerCase();
                return e.name.toLowerCase().includes(q) || e.hash.toLowerCase().includes(q);
            });
            if (filtered.length === 0) {
                container.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-sm text-slate-500">No cached packages found</td></tr>';
                return;
            }
            filtered.forEach(e => {
                const date = new Date(e.added).toLocaleString();
                container.innerHTML += '<tr class="hover:bg-slate-900/40 transition-colors">' +
                    '<td class="whitespace-nowrap py-4 pl-6 pr-3 text-sm font-semibold text-slate-200">' + e.name + '</td>' +
                    '<td class="whitespace-nowrap px-3 py-4 text-sm font-mono text-slate-400 select-all">' + e.hash + '</td>' +
                    '<td class="whitespace-nowrap px-3 py-4 text-sm text-indigo-400 font-medium">' + formatBytes(e.nar_size) + '</td>' +
                    '<td class="whitespace-nowrap px-3 py-4 text-sm text-slate-500">' + date + '</td>' +
                    '</tr>';
            });
        }

        searchInput.addEventListener("input", (e) => render(e.target.value));
        render("");

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function copyCmd() {
            const cmdText = document.getElementById("nix-cmd").innerText;
            navigator.clipboard.writeText(cmdText).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                btn.classList.replace("bg-slate-800", "bg-emerald-600");
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace("bg-emerald-600", "bg-slate-800");
                }, 1500);
            });
        }
    </script>
</body>
</html>
